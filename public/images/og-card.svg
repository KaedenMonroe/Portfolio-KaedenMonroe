<svg
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="og-card-title og-card-desc"
>
  <title id="og-card-title">Kaeden Monroe — Mechanical Engineering, Systems</title>
  <desc id="og-card-desc">
    A blueprint style card: a mono index rail on the left, the name Kaeden Monroe, the role
    Mechanical Engineering — Systems, and the line Building the hardware that thinks for itself.
  </desc>

  <!-- paper background -->
  <rect x="0" y="0" width="1200" height="630" fill="#ffffff" />

  <!-- grid rail -->
  <rect x="0" y="0" width="90" height="630" fill="#fafaf8" />
  <line x1="90" y1="0" x2="90" y2="630" stroke="#e3e2de" stroke-width="1" />
  <g font-family="IBM Plex Mono, ui-monospace, monospace" font-size="13" font-weight="500" fill="#9a9a94" text-anchor="middle">
    <text x="45" y="144">01</text>
    <text x="45" y="234">02</text>
    <text x="45" y="324">03</text>
    <text x="45" y="414">04</text>
    <text x="45" y="504">05</text>
  </g>

  <!-- eyebrow: role -->
  <text
    x="154"
    y="176"
    font-family="IBM Plex Mono, ui-monospace, monospace"
    font-size="24"
    font-weight="500"
    letter-spacing="2"
    fill="#2f6fb8"
  >MECHANICAL ENGINEERING — SYSTEMS</text>

  <!-- name -->
  <text
    x="150"
    y="300"
    font-family="Helvetica, Arial, sans-serif"
    font-size="92"
    font-weight="600"
    fill="#161616"
  >Kaeden Monroe</text>

  <!-- divider -->
  <line x1="154" y1="352" x2="1136" y2="352" stroke="#f0efec" stroke-width="1" />

  <!-- tagline -->
  <text
    x="154"
    y="404"
    font-family="Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#3a3a36"
  >Building the hardware that thinks for itself.</text>

  <!-- footer meta -->
  <line x1="154" y1="540" x2="1136" y2="540" stroke="#f0efec" stroke-width="1" />
  <text
    x="154"
    y="578"
    font-family="IBM Plex Mono, ui-monospace, monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="1"
    fill="#6b6b66"
  >FIG. 00 — PORTFOLIO PREVIEW</text>
  <text
    x="1136"
    y="578"
    font-family="IBM Plex Mono, ui-monospace, monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="1"
    fill="#6b6b66"
    text-anchor="end"
  >KAEDEN-MONROE-PORTFOLIO.NETLIFY.APP</text>

  <!-- outer frame -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#e3e2de" stroke-width="1" />
</svg>
